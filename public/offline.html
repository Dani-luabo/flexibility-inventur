<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Flexibility Inventur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #061210;
      color: #94a3b8;
      font-family: -apple-system, 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #0d2b22;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      border: 1px solid rgba(74,222,128,0.2);
    }
    h1 { color: #4ade80; font-size: 20px; font-weight: 700; letter-spacing: 0.04em; }
    p  { font-size: 14px; text-align: center; color: #64748b; }
    button {
      margin-top: 16px;
      padding: 10px 22px;
      background: #4ade80;
      color: #0d2b22;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="34" height="32" viewBox="0 0 48 46" fill="white">
      <path d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
    </svg>
  </div>
  <h1>FLEXIBILITY INVENTUR</h1>
  <p>Keine Internetverbindung</p>
  <p style="font-size: 12px;">Stelle eine Verbindung her und versuche es erneut.</p>
  <button onclick="location.reload()">Neu laden</button>
</body>
</html>
